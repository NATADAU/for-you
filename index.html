<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ты не одна</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { width: 500px; height: 500px; background: #f7c9a8; top: -150px; left: -150px; animation: drift 14s ease-in-out infinite; }
    .glow-2 { width: 400px; height: 400px; background: #c8dff7; bottom: -100px; right: -100px; animation: drift 18s ease-in-out infinite reverse; }
    .glow-3 { width: 300px; height: 300px; background: #f7c8d4; top: 40%; left: 30%; animation: drift 20s ease-in-out infinite 4s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(20px, -25px); }
    }

    #balloons {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Кнопка музыки */
    .music-btn {
      position: fixed;
      top: 1.1rem; right: 1.1rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 2px 14px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .music-btn:hover { transform: scale(1.12); }
    .music-btn.playing { 
        background: rgba(247,200,160,0.85); 
        animation: rotate 4s linear infinite;
    }
    
    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .wrap {
      position: relative;
      z-index: 10;
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 0 0.5rem;
    }

    @media (max-width: 480px) {
      body { padding: 1.2rem 1rem; justify-content: flex-start; padding-top: 10vh; }
      .glow-1 { width: 280px; height: 280px; }
      .glow-2 { width: 220px; height: 220px; }
      .glow-3 { width: 180px; height: 180px; }
    }

    /* Круг с персонажем */
    .avatar-ring {
      width: clamp(90px, 22vw, 120px);
      height: clamp(90px, 22vw, 120px);
      border-radius: 50%;
      margin: 0 auto 1.6rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,0,0,0.14);
    }

    .avatar-slide {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .avatar-slide.active { opacity: 1; }

    .avatar-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar-slide .fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: normal;
      color: #5a4a42;
      line-height: 1.5;
      margin-bottom: 0.8rem;
    }

    .sub {
      font-size: 1rem;
      color: #a08c82;
      margin-bottom: 3rem;
      line-height: 1.7;
    }

    .phrase-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.4rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 40px rgba(180,140,120,0.12);
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .phrase-text {
      font-size: clamp(1rem, 4vw, 1.35rem);
      color: #5a4a42;
      line-height: 1.7;
      font-style: italic;
    }

    .phrase-card.fade-out { opacity: 0; transform: translateY(-8px); }
    .phrase-card.fade-in  { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn {
      display: inline-block;
      padding: 0.95rem 2.2rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #f5cba7, #f7b8c8);
      color: #5a3a30;
      font-family: 'Georgia', serif;
      font-size: clamp(0.95rem, 3.5vw, 1rem);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,180,150,0.35);
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(245,180,150,0.5); }
    .btn:active { transform: scale(0.97); }

    .counter {
      margin-top: 1.4rem;
      font-size: 0.85rem;
      color: #c4a898;
      letter-spacing: 1px;
    }
    .heart {
      display: inline-block;
      animation: heartbeat 2.4s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%        { transform: scale(1.18); }
      60%        { transform: scale(1.06); }
    }
  </style>
</head>
<body>

<canvas id="balloons"></canvas>
<canvas id="confetti"></canvas>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<!-- Кнопка музыки -->
<button class="music-btn" id="musicBtn" title="Включить музыку" onclick="toggleMusic()">♪</button>

<!-- Скрытый элемент аудио -->
<audio id="bgMusic" loop preload="auto">
  <source src="mixkit-sleepy-cat-135.mp3" type="audio/mpeg">
  Ваш браузер не поддерживает аудио элемент.
</audio>

<div class="wrap">
  <div class="avatar-ring" id="avatarRing"></div>
  <h1>Сейчас трудно.<br>Это правда.</h1>
  <p class="sub">Нажми для просто так или для радости.</p>

  <div class="phrase-card fade-in" id="card">
    <p class="phrase-text" id="phrase">Ты справляешься лучше, чем тебе кажется.</p>
  </div>

  <button class="btn" id="btn" onclick="nextPhrase()">эти слова волшебные</button>

  <p class="counter"><span class="heart">♡</span> <span id="count">1</span> / 12</p>
</div>

<script>
/* ── Персонажи ── */
const characters = [
  { file: 'img/moomin1.jpg', bg: '#7cc97a', emoji: '🌸' },
  { file: 'img/moomin2.jpg', bg: '#6db8d6', emoji: '🎩' },
  { file: 'img/moomin3.jpg', bg: '#f090b0', emoji: '🌺' },
  { file: 'img/moomin4.jpg', bg: '#7ab8e0', emoji: '⛏️' },
  { file: 'img/moomin5.jpg', bg: '#5aaa6a', emoji: '😤' },
  { file: 'img/moomin6.jpg', bg: '#f0d040', emoji: '🎶' },
  { file: 'img/moomin7.jpg', bg: '#e05050', emoji: '✨' },
  { file: 'img/moomin8.jpg', bg: '#e87840', emoji: '🌧️' },
  { file: 'img/moomin9.jpg', bg: '#70b8e0', emoji: '💃' },
];

const ring = document.getElementById('avatarRing');
let avatarIdx = 0;

characters.forEach((c, i) => {
  const slide = document.createElement('div');
  slide.className = 'avatar-slide' + (i === 0 ? ' active' : '');
  slide.innerHTML = `
    <div class="fallback" style="background:${c.bg}">
      <img src="${c.file}" alt="" onerror="this.parentNode.innerHTML='<div class=fallback style=background:${c.bg};width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.6rem>${c.emoji}</div>'">
    </div>`;
  ring.appendChild(slide);
});

function nextAvatar() {
  const slides = ring.querySelectorAll('.avatar-slide');
  if(!slides.length) return;
  slides[avatarIdx].classList.remove('active');
  avatarIdx = (avatarIdx + 1) % slides.length;
  slides[avatarIdx].classList.add('active');
}
setInterval(nextAvatar, 3000);

/* ── Фразы ── */
const phrases = [
  "Ты справляешься лучше, чем тебе кажется.",
  "Можно просто дышать. Этого уже достаточно.",
  "Твои чувства настоящие — и ты имеешь право их чувствовать.",
  "Ты не один, даже если сейчас так ощущается.",
  "После самой тёмной ночи всё равно приходит утро.",
  "Маленький шаг вперёд — это всё равно шаг.",
  "Тебе не нужно быть сильной прямо сейчас. Можно просто быть.",
  "Ты важен. Не за что-то — просто так.",
  "Всё это временно. А ты — нет.",
  "Разрешено отдыхать. Разрешено не знать ответов.",
  "Кто-то думает о тебе тепло прямо в эту минуту.",
  "Ты дошла до сегодня. Это что-то значит."
];
let current = 0;

function nextPhrase() {
  const card = document.getElementById('card');
  const phraseEl = document.getElementById('phrase');
  card.classList.remove('fade-in');
  card.classList.add('fade-out');
  setTimeout(() => {
    current = (current + 1) % phrases.length;
    phraseEl.textContent = phrases[current];
    document.getElementById('count').textContent = current + 1;
    card.classList.remove('fade-out');
    void card.offsetWidth;
    card.classList.add('fade-in');
    burstConfetti();
    nextAvatar();
  }, 400);
}

/* ── Конфетти ── */
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];
const COLORS = ['#f5cba7','#f7b8c8','#c8dff7','#b8f0c8','#e8c8f7','#ffeaa7'];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function spawnBurst(x, y) {
  for (let i = 0; i < 48; i++) particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 6,
    vy: Math.random() * -5 - 1,
    size: Math.random() * 7 + 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    gravity: 0.13, life: 1
  });
}

function burstConfetti() { spawnBurst(canvas.width / 2, canvas.height * 0.45); }

function idleConfetti() {
  if (Math.random() < 0.1) particles.push({
    x: Math.random() * canvas.width, y: -10,
    vx: (Math.random() - 0.5) * 1,
    vy: Math.random() * 1 + 0.4,
    size: Math.random() * 5 + 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.07,
    gravity: 0, life: 1
  });
}

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  idleConfetti();
  particles = particles.filter(p => p.life > 0.01);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.angle += p.spin; p.life -= 0.007;
    ctx.save();
    ctx.globalAlpha = Math.min(p.life * 2, 0.85);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    ctx.restore();
  }
  requestAnimationFrame(loop);
})();

/* ── Шарики ── */
const bc    = document.getElementById('balloons');
const bctx  = bc.getContext('2d');

function resizeB() { bc.width = window.innerWidth; bc.height = window.innerHeight; }
resizeB();
window.addEventListener('resize', resizeB);

const bPalette = ['#f7b8c8','#f5cba7','#c8dff7','#d4f7c8','#e8c8f7','#ffd6e0','#ffe8b0'];
const balloonList = [];

function spawnBalloon() {
  const color = bPalette[Math.floor(Math.random() * bPalette.length)];
  balloonList.push({
    x:      40 + Math.random() * (bc.width - 80),
    y:      bc.height + 120,
    vy:     0.7 + Math.random() * 0.8,
    r:      42 + Math.random() * 38,
    color,
    phase: Math.random() * Math.PI * 2,
    swayA: 18 + Math.random() * 28,
    swayS: 0.012 + Math.random() * 0.014,
    t: 0,
  });
}

function drawBalloon(b) {
  const dx = Math.sin(b.phase + b.t * b.swayS) * b.swayA;
  const x  = b.x + dx;
  const y  = b.y;
  const r  = b.r;
  const fadeIn  = Math.min(1, (bc.height - y + 120) / 80);
  const fadeOut = Math.min(1, (y + 60) / 60);
  bctx.globalAlpha = Math.max(0, Math.min(fadeIn, fadeOut) * 0.88);
  bctx.beginPath();
  bctx.ellipse(x, y, r * 0.72, r, 0, 0, Math.PI * 2);
  bctx.fillStyle = b.color;
  bctx.fill();
  bctx.beginPath();
  bctx.ellipse(x - r * 0.22, y - r * 0.28, r * 0.22, r * 0.16, -0.4, 0, Math.PI * 2);
  bctx.fillStyle = 'rgba(255,255,255,0.5)';
  bctx.fill();
  bctx.beginPath();
  bctx.ellipse(x, y + r + 3, r * 0.1, r * 0.08, 0, 0, Math.PI * 2);
  bctx.fillStyle = b.color;
  bctx.fill();
  const kx  = x;
  const ky  = y + r + 6;
  const cp1 = { x: kx + Math.sin(b.phase + 1) * 12, y: ky + r * 0.9 };
  const cp2 = { x: kx - Math.sin(b.phase + 2) * 12, y: ky + r * 1.8 };
  const ex  = kx + Math.sin(b.phase) * 8;
  const ey  = ky + r * 2.6;
  bctx.beginPath();
  bctx.moveTo(kx, ky);
  bctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, ex, ey);
  bctx.strokeStyle = 'rgba(140,100,80,0.35)';
  bctx.lineWidth = 0.9;
  bctx.stroke();
}

(function balloonLoop() {
  bctx.clearRect(0, 0, bc.width, bc.height);
  for (let i = balloonList.length - 1; i >= 0; i--) {
    const b = balloonList[i];
    b.y -= b.vy;
    b.t++;
    if (b.y < -200) { balloonList.splice(i, 1); continue; }
    drawBalloon(b);
  }
  bctx.globalAlpha = 1;
  requestAnimationFrame(balloonLoop);
})();

setTimeout(() => {
  for (let i = 0; i < 20; i++) setTimeout(spawnBalloon, i * 180);
}, 600);
setInterval(spawnBalloon, 850);

/* ── ЛОГИКА МУЗЫКИ ── */
const music = document.getElementById('bgMusic');
const mBtn = document.getElementById('musicBtn');

function toggleMusic() {
  if (music.paused) {
    const playPromise = music.play();
    
    if (playPromise !== undefined) {
      playPromise.then(() => {
        mBtn.textContent = '♫';
        mBtn.classList.add('playing');
      }).catch(error => {
        console.error("Ошибка воспроизведения:", error);
        // Если файл не найден, кнопка не изменится
      });
    }
  } else {
    music.pause();
    mBtn.textContent = '♪';
    mBtn.classList.remove('playing');
  }
}

// Проверка загрузки файла
music.addEventListener('error', function(e) {
  console.error("Не удалось загрузить аудиофайл. Проверьте путь:", music.currentSrc);
});
</script>

</body>
</html>
