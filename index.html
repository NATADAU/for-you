<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ты не одна</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { width: 500px; height: 500px; background: #f7c9a8; top: -150px; left: -150px; animation: drift 14s ease-in-out infinite; }
    .glow-2 { width: 400px; height: 400px; background: #c8dff7; bottom: -100px; right: -100px; animation: drift 18s ease-in-out infinite reverse; }
    .glow-3 { width: 300px; height: 300px; background: #f7c8d4; top: 40%; left: 30%; animation: drift 20s ease-in-out infinite 4s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(20px, -25px); }
    }

    /* Кнопка музыки */
    .music-btn {
      position: fixed;
      top: 1.1rem; right: 1.1rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 2px 14px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .music-btn.playing { 
        background: rgba(247,200,160,0.85); 
        animation: rotate 4s linear infinite;
    }
    
    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .wrap {
      position: relative;
      z-index: 10;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* Круг с персонажем */
    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 1.6rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,0,0,0.14);
      background: #fff;
    }

    .avatar-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-slide.active { opacity: 1; }

    .avatar-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 2rem;
      color: #5a4a42;
      margin-bottom: 0.8rem;
    }

    .phrase-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.4rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 40px rgba(180,140,120,0.12);
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      padding: 1rem 2.5rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #f5cba7, #f7b8c8);
      color: #5a3a30;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(245,180,150,0.35);
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪</button>

<audio id="bgMusic" loop>
  <source src="mixkit-sleepy-cat-135.mp3" type="audio/mpeg">
</audio>

<div class="wrap">
  <div class="avatar-ring" id="avatarRing">
    <!-- Слайды создаются через JS -->
  </div>
  
  <h1>Сейчас трудно.<br>Это правда.</h1>

  <div class="phrase-card" id="card">
    <p id="phrase">Ты справляешься лучше, чем тебе кажется.</p>
  </div>

  <button class="btn" onclick="nextPhrase()">эти слова волшебные</button>
</div>

<script>
/* Список твоих загруженных картинок */
const images = [
  'moomin1.png',
  'moomin2.png',
  'moomin3.png',
  'moomin4.png',
  'moomin5.png',
  'moomin6.png',
  'moomin7.png'
];

const ring = document.getElementById('avatarRing');
let avatarIdx = 0;

// Создаем элементы для картинок
images.forEach((src, i) => {
  const slide = document.createElement('div');
  slide.className = 'avatar-slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = src;
  img.alt = "Moomin Character";
  // Если картинка не загрузится, покажем цветной круг
  img.onerror = () => {
      slide.style.background = '#f7c9a8';
      img.style.display = 'none';
  };
  slide.appendChild(img);
  ring.appendChild(slide);
});

function rotateAvatars() {
  const slides = document.querySelectorAll('.avatar-slide');
  slides[avatarIdx].classList.remove('active');
  avatarIdx = (avatarIdx + 1) % slides.length;
  slides[avatarIdx].classList.add('active');
}
setInterval(rotateAvatars, 3000);

const phrases = [
  "Ты справляешься лучше, чем тебе кажется.",
  "Можно просто дышать. Этого уже достаточно.",
  "Твои чувства настоящие — и ты имеешь право их чувствовать.",
  "Ты не одна, даже если сейчас так ощущается.",
  "После самой тёмной ночи всё равно приходит утро.",
  "Маленький шаг вперёд — это всё равно шаг.",
  "Кто-то думает о тебе тепло прямо в эту минуту."
];
let pIdx = 0;

function nextPhrase() {
  pIdx = (pIdx + 1) % phrases.length;
  document.getElementById('phrase').textContent = phrases[pIdx];
  rotateAvatars();
}

/* Музыка */
const music = document.getElementById('bgMusic');
const mBtn = document.getElementById('musicBtn');

function toggleMusic() {
  if (music.paused) {
    music.play().then(() => {
        mBtn.textContent = '♫';
        mBtn.classList.add('playing');
    }).catch(e => console.log("Ошибка звука:", e));
  } else {
    music.pause();
    mBtn.textContent = '♪';
    mBtn.classList.remove('playing');
  }
}
</script>

</body>
</html>
