<canvas id="balloons"></canvas>

<div class="glow glow-1"></div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪</button>

<audio id="bgMusic" loop>

</audio>

<div class="wrap">
  <div class="avatar-ring" id="avatarRing"></div>
  
  <h1>Сейчас трудно.<br>Это правда.</h1>

  <div class="phrase-card" id="card">
    <p id="phrase">Ты справляешься лучше, чем тебе кажется.</p>
  </div>

  <button class="btn" onclick="nextAction()">Прикоснись ко мне</button>
</div>

<script>
const imageNames = ['moomin1.png', 'moomin2.png', 'moomin3.png', 'moomin4.png', 'moomin5.png', 'moomin6.png', 'moomin7.png'];
const phrases = [
  "Ты справляешься лучше, чем тебе кажется.",
  "Можно просто дышать. Этого уже достаточно.",
  "Твои чувства настоящие — и ты имеешь право их чувствовать.",
  "Ты не одна, даже если сейчас так ощущается.",
  "После самой тёмной ночи всё равно приходит утро.",
  "Маленький шаг вперёд — это всё равно шаг.",
  "Кто-то думает о тебе тепло прямо в эту минуту."
];

const ring = document.getElementById('avatarRing');
let avatarIdx = 0;
let pIdx = 0;

function initAvatars() {
  ring.innerHTML = '';
  imageNames.forEach((name, i) => {
    const slide = document.createElement('div');
    slide.className = 'avatar-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = `./${name}`;
    img.onerror = () => { 
      slide.style.background = '#f7c9a8'; 
      img.style.display = 'none'; 
      slide.innerHTML = `<span style="font-size:2.5rem">🌸</span>`;
    };
    slide.appendChild(img);
    ring.appendChild(slide);
  });
}

initAvatars();

function rotateAvatars() {
  const slides = document.querySelectorAll('.avatar-slide');
  if (!slides.length) return;
  slides[avatarIdx].classList.remove('active');
  avatarIdx = (avatarIdx + 1) % slides.length;
  slides[avatarIdx].classList.add('active');
}

function nextAction() {
  pIdx = (pIdx + 1) % phrases.length;
  document.getElementById('phrase').textContent = phrases[pIdx];
  rotateAvatars();
  spawnBurst();
}

/* --- КОНФЕТТИ --- */
const cCanvas = document.getElementById('confetti');
const cCtx = cCanvas.getContext('2d');
let cParticles = [];

function spawnBurst() {
  for(let i=0; i<40; i++) {
    cParticles.push({
      x: cCanvas.width/2, y: cCanvas.height/2,
      vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
      size: Math.random()*6+2, color: ['#f5cba7','#f7b8c8','#c8dff7'][Math.floor(Math.random()*3)],
      life: 1
    });
  }
}

/* --- ШАРИКИ (ПОВЫШЕННАЯ ЧАСТОТА) --- */
const bCanvas = document.getElementById('balloons');
const bCtx = bCanvas.getContext('2d');
let balloonList = [];
const bPalette = ['#f7b8c8','#f5cba7','#c8dff7','#d4f7c8','#e8c8f7','#ffd6e0'];

function resize() { 
  cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; 
  bCanvas.width = window.innerWidth; bCanvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function spawnBalloon() {
  balloonList.push({
    x: 40 + Math.random() * (bCanvas.width - 80),
    y: bCanvas.height + 150,
    vy: 0.7 + Math.random() * 0.8,
    r: 42 + Math.random() * 38,
    color: bPalette[Math.floor(Math.random() * bPalette.length)],
    phase: Math.random() * Math.PI * 2,
    swayA: 18 + Math.random() * 28,
    swayS: 0.012 + Math.random() * 0.014,
    t: 0
  });
}

function drawBalloon(b) {
  const dx = Math.sin(b.phase + b.t * b.swayS) * b.swayA;
  const x = b.x + dx;
  const y = b.y;
  const r = b.r;

  const fadeIn = Math.min(1, (bCanvas.height - y + 120) / 80);
  const fadeOut = Math.min(1, (y + 60) / 60);
  bCtx.globalAlpha = Math.max(0, Math.min(fadeIn, fadeOut) * 0.8);

  bCtx.beginPath();
  bCtx.ellipse(x, y, r * 0.72, r, 0, 0, Math.PI * 2);
  bCtx.fillStyle = b.color;
  bCtx.fill();

  bCtx.beginPath();
  bCtx.ellipse(x - r * 0.22, y - r * 0.28, r * 0.22, r * 0.16, -0.4, 0, Math.PI * 2);
  bCtx.fillStyle = 'rgba(255,255,255,0.5)';
  bCtx.fill();

  bCtx.beginPath();
  bCtx.ellipse(x, y + r + 3, r * 0.1, r * 0.08, 0, 0, Math.PI * 2);
  bCtx.fillStyle = b.color;
  bCtx.fill();

  const kx = x;
  const ky = y + r + 6;
  const cp1 = { x: kx + Math.sin(b.phase + 1) * 12, y: ky + r * 0.9 };
  const cp2 = { x: kx - Math.sin(b.phase + 2) * 12, y: ky + r * 1.8 };
  const ex = kx + Math.sin(b.phase) * 8;
  const ey = ky + r * 2.6;
  
  bCtx.beginPath();
  bCtx.moveTo(kx, ky);
  bCtx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, ex, ey);
  bCtx.strokeStyle = 'rgba(140,100,80,0.3)';
  bCtx.lineWidth = 1;
  bCtx.stroke();
}

function animate() {
  cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
  bCtx.clearRect(0,0,bCanvas.width,bCanvas.height);

  cParticles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.015;
    if(p.life <= 0) cParticles.splice(i, 1);
    cCtx.fillStyle = p.color;
    cCtx.globalAlpha = p.life;
    cCtx.fillRect(p.x, p.y, p.size, p.size);
  });

  // Увеличен шанс появления шарика (был 0.015, стал 0.025)
  if(Math.random() < 0.025) spawnBalloon();
  balloonList.forEach((b, i) => {
    b.y -= b.vy;
    b.t++;
    if(b.y < -300) balloonList.splice(i, 1);
    drawBalloon(b);
  });

  requestAnimationFrame(animate);
}

animate();

/* Музыка */
const music = document.getElementById('bgMusic');
const mBtn = document.getElementById('musicBtn');

function toggleMusic() {
  if (music.paused) {
    music.play().then(() => {
        mBtn.textContent = '♫';
        mBtn.classList.add('playing');
    }).catch(e => console.log("Ошибка звука:", e));
  } else {
    music.pause();
    mBtn.textContent = '♪';
    mBtn.classList.remove('playing');
  }
}
</script>

</body>

<script>
// Список имен ваших загруженных файлов
const imageNames = ['moomin1.png', 'moomin2.png', 'moomin3.png', 'moomin4.png', 'moomin5.png', 'moomin6.png', 'moomin7.png'];
const phrases = [
  "Ты справляешься лучше, чем тебе кажется.",

function getFilePath(fileName) {
  // В среде Canvas загруженные файлы доступны в этой папке
  return `./${fileName}`;
}

function initAvatars() {
  ring.innerHTML = '';
  imageNames.forEach((name, i) => {
    const slide = document.createElement('div');
    slide.className = 'avatar-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    
    // Используем путь к файлу
    img.src = getFilePath(name);
    
    img.onerror = () => { 
      console.log('Ошибка загрузки:', name);
      slide.style.background = '#f7c9a8'; 
      img.style.display = 'none'; 
      slide.innerHTML = `<span style="font-size:2rem">✨</span>`;
    };
    slide.appendChild(img);
    ring.appendChild(slide);
  });
}

function rotateAvatars() {

  if (slides.length === 0) return;
  slides[avatarIdx].classList.remove('active');
  avatarIdx = (avatarIdx + 1) % slides.length;
  slides[avatarIdx].classList.add('active');
}

function nextAction() {
  pIdx = (pIdx + 1) % phrases.length;
  document.getElementById('phrase').textContent = phrases[pIdx];
  rotateAvatars();
  spawnBurst();

/* Конфетти */

      x: canvas.width/2, y: canvas.height/2,

    });
